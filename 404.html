<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>404 | SoulHacker</title>

<link rel="stylesheet" href="styles.css">

<style>

body{

background:#050505;

display:flex;

justify-content:center;

align-items:center;

height:100vh;

overflow:hidden;

font-family:Poppins,sans-serif;

}

.error{

text-align:center;

}

.error h1{

font-size:8rem;

color:#2563eb;

margin:0;

}

.error p{

font-size:1.2rem;

color:#9ca3af;

margin-bottom:40px;

}

.error a{

display:inline-block;

padding:15px 32px;

border-radius:40px;

background:#2563eb;

color:#fff;

text-decoration:none;

transition:.3s;

}

.error a:hover{

transform:translateY(-5px);

box-shadow:0 10px 25px rgba(37,99,255,.4);

}

</style>

</head>

<body>

<div class="error">

<h1>404</h1>

<p>Looks like you're lost in cyberspace.</p>

<a href="/">Return Home</a>

</div>

</body>

</html>
